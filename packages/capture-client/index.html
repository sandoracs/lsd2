<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>LSD2 Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 16px;
    }
    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: #666;
      font-weight: 300;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 16px;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    label {
      font-size: 0.72rem;
      color: #666;
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #eee;
      font-size: 0.95rem;
      padding: 9px 12px;
      width: 100%;
      outline: none;
    }
    select:focus { border-color: #4060ff; }
    input[type="text"],
    input[type="number"] {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #eee;
      font-size: 0.95rem;
      padding: 9px 12px;
      width: 100%;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus { border-color: #4060ff; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    button {
      background: #4060ff;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px;
      width: 100%;
      transition: background 0.15s;
    }
    button:hover { background: #5575ff; }
    button.stop { background: #8b0000; }
    button.stop:hover { background: #a00; }
    #status {
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 10px;
      text-align: center;
      background: #333;
      letter-spacing: 0.05em;
    }
    #current-note {
      font-size: 2.8rem;
      font-weight: 800;
      text-align: center;
      color: #fff;
      min-height: 3.5rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #current-freq {
      font-size: 0.85rem;
      color: #555;
      text-align: center;
      min-height: 1.2rem;
    }
    #current-chord {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      color: #7080cc;
      min-height: 2.2rem;
      letter-spacing: 0.04em;
    }
    #current-key {
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      color: #508870;
      min-height: 1.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #overtones {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 1rem;
    }
    .overtone-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #888;
      padding: 2px 0;
      border-top: 1px solid #1e1e1e;
    }
    .overtone-note {
      font-weight: 700;
      color: #bbb;
      min-width: 2.8rem;
    }
    .overtone-freq {
      color: #555;
      min-width: 5rem;
      text-align: right;
    }
    .overtone-amp {
      width: 60px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }
    .overtone-amp-fill {
      height: 100%;
      background: linear-gradient(to right, #336, #66a);
      border-radius: 2px;
    }

    /* Combined VU + gate control */
    .gate-wrap {
      position: relative;
      height: 28px;
      display: flex;
      align-items: center;
    }
    .gate-track {
      position: absolute;
      left: 0; right: 0;
      height: 12px;
      background: #0d0d0d;
      border-radius: 6px;
      overflow: hidden;
      pointer-events: none;
    }
    #vu-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #00cc66 0%, #ffaa00 65%, #cc0000 100%);
      transition: width 60ms linear;
    }
    #noise-gate {
      -webkit-appearance: none;
      appearance: none;
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      cursor: ew-resize;
      margin: 0;
      padding: 0;
    }
    #noise-gate::-webkit-slider-runnable-track { background: transparent; height: 100%; }
    #noise-gate::-moz-range-track { background: transparent; height: 100%; }
    #noise-gate::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 5px;
      height: 28px;
      background: rgba(255,255,255,0.9);
      border-radius: 3px;
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
      cursor: ew-resize;
    }
    #noise-gate::-moz-range-thumb {
      width: 5px;
      height: 28px;
      background: rgba(255,255,255,0.9);
      border-radius: 3px;
      border: none;
      cursor: ew-resize;
    }
  </style>
</head>
<body>
  <h1>LSD2 CAPTURE</h1>

  <div id="cert-banner" class="card" style="background:#111;border-color:#2a2000;font-size:0.78rem;color:#c0a060;padding:12px 16px;position:relative;">
    First time? <a id="cert-link" href="https://192.168.0.132:3000/health" target="_blank"
      style="color:#ffcc44;font-weight:600;">Open server health page</a> and accept the certificate, then come back.
    <button onclick="document.getElementById('cert-banner').remove()" style="
      position:absolute;top:6px;right:8px;
      background:none;border:none;color:#8a6a30;font-size:1rem;line-height:1;
      cursor:pointer;padding:2px 4px;width:auto;
    ">&times;</button>
  </div>

  <div class="card">
    <div>
      <label>Server URL</label>
      <input id="server-url" type="text" value="wss://192.168.0.132:3000" />
    </div>
    <div class="row">
      <div>
        <label>Session ID</label>
        <input id="session-id" type="text" value="default" />
      </div>
      <div>
        <label>Max Overtones</label>
        <input id="max-overtones" type="number" value="8" min="1" max="16" />
      </div>
    </div>
    <div class="row">
      <div>
        <label>Source</label>
        <select id="source-select">
          <option value="mic">Microphone</option>
          <option value="midi">MIDI</option>
        </select>
      </div>
      <div id="midi-device-wrap" style="display:none">
        <label>MIDI Device</label>
        <select id="midi-device">
          <option value="">All devices</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Instrument Key</label>
        <select id="instrument-key">
          <option value="0">C (concert)</option>
          <option value="2">Bb (clarinet, trumpet…)</option>
          <option value="9">Eb (alto/bari sax…)</option>
          <option value="7">F (horn…)</option>
        </select>
      </div>
    </div>
    <div id="status">Stopped</div>
    <button id="connect-btn">Start Capture</button>
  </div>

  <div class="card">
    <div id="current-note">—</div>
    <div id="current-freq"></div>
    <div id="current-chord"></div>
    <div id="current-key"></div>
    <div>
      <label>Gate — <span id="gate-val">-40</span> <span id="gate-unit">dB</span></label>
      <div class="gate-wrap">
        <div class="gate-track"><div id="vu-bar"></div></div>
        <input id="noise-gate" type="range" min="-60" max="-10" step="1" value="-40" />
      </div>
    </div>
    <div id="overtones"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
